# git action
name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run linter
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=env,venv,__pycache__,.git,anidata-scraper

  test-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install scraper dependencies
        working-directory: anidata-scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run scraper tests
        working-directory: anidata-scraper
        run: pytest --tb=short -v

  trigger-dag:
    name: Trigger Airflow DAG
    runs-on: self-hosted
    needs: [build, test-scraper]
    continue-on-error: true
    timeout-minutes: 1

    steps:
      - name: Trigger 02_scrape_mock_site
        run: |
          curl -X POST http://localhost:8080/api/v1/dags/02_scrape_mock_site/dagRuns \
            -H "Content-Type: application/json" \
            -u admin:admin \
            -d '{"conf": {}}'
